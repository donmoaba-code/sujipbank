<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수집뱅크 통합 검색기</title>
    
    <!-- 1. 화면 디자인 도구 (Tailwind CSS) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. 프로그램 구동 엔진 (React) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 3. 코드 번역기 (Babel) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="root"></div>

    <!-- 여기서부터 실제 프로그램 코드입니다 -->
    <script type="text/babel">
        // 중요: import 문을 쓰지 않고 React 기능을 가져옵니다.
        const { useState } = React;

        // --- 아이콘 그림 (오류 방지를 위해 직접 그림) ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const Icons = {
            Search: <Icon path={<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>} />,
            Reset: <Icon path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />,
            Close: <Icon path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />,
            Category: <Icon path={<><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></>} />,
            Filter: <Icon path={<><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>} />,
            Eye: <Icon path={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />,
            Link: <Icon path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />,
            RadioOn: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-blue-600"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5" fill="currentColor"/></svg>,
            RadioOff: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="text-gray-300"><circle cx="12" cy="12" r="10"/></svg>
        };

        const CATEGORIES = [
            { id: '001', label: '한국지폐' }, { id: '002', label: '한국주화' },
            { id: '003', label: '세계지폐' }, { id: '004', label: '세계주화' },
            { id: '005', label: '한국우표' }, { id: '006', label: '외국우표' },
        ];

        const SORT_OPTIONS = [
            { value: '', label: '추천순' }, { value: 'orderCnt', label: '인기순' },
            { value: 'price_asc', label: '낮은가격' }, { value: 'price_desc', label: '높은가격' },
            { value: 'regDt', label: '등록일순' },
        ];

        const PAGE_SIZE_OPTIONS = ['30', '60', '90', '120'];

        // 메인 프로그램 로직
        function App() {
            const [keyword, setKeyword] = useState('');
            const [selectedCat, setSelectedCat] = useState('');
            const [sortMethod, setSortMethod] = useState('');
            const [itemsPerPage, setItemsPerPage] = useState('30');
            const [searchUrl, setSearchUrl] = useState('');

            // 카테고리 클릭 (선택/해제 토글)
            const handleCategoryClick = (id) => {
                setSelectedCat(prev => prev === id ? '' : id);
            };

            const resetAll = () => {
                setKeyword(''); setSelectedCat('');
                setSortMethod(''); setItemsPerPage('30'); setSearchUrl('');
            };

            const executeSearch = () => {
                const baseUrl = 'https://www.sujipbank.com/goods/goods_search.php';
                const params = [];

                // 1. 카테고리 (단일 선택)
                if (selectedCat) {
                    params.push('mode=quick');
                    params.push(`quickCateGoods[]=${selectedCat}`);
                }

                // 2. 검색어
                params.push(`keyword=${encodeURIComponent(keyword.trim())}`);

                // 3. 옵션
                if (sortMethod) params.push(`sort=${sortMethod}`);
                params.push(`pageNum=${itemsPerPage}`);

                const finalUrl = `${baseUrl}?${params.join('&')}`;
                setSearchUrl(finalUrl);
                
                // 새 창 열기
                window.open(finalUrl, '_blank');
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                        
                        {/* 상단 제목 */}
                        <div className="bg-white p-8 border-b border-gray-100 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-extrabold text-blue-900 flex items-center gap-3">
                                    <span className="text-blue-600">{Icons.Search}</span>
                                    수집뱅크 통합 검색
                                </h1>
                                <p className="text-gray-500 mt-2 text-sm">
                                    검색 버튼을 누르면 <b>새 창</b>에서 결과가 열립니다.
                                </p>
                            </div>
                            <button onClick={resetAll} className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-bold text-gray-600 transition-colors">
                                {Icons.Reset} 초기화
                            </button>
                        </div>

                        {/* 입력 영역 */}
                        <div className="p-8 space-y-8">
                            
                            {/* 검색어 */}
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">검색어 입력</label>
                                <div className="relative">
                                    <input 
                                        type="text" 
                                        value={keyword}
                                        onChange={(e) => setKeyword(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && executeSearch()}
                                        placeholder="예: 1000원, 올림픽 (비워두면 전체 검색)"
                                        className="w-full h-14 pl-5 pr-12 border-2 border-gray-200 rounded-xl text-lg focus:border-blue-500 focus:outline-none transition-colors"
                                    />
                                    {keyword && (
                                        <button onClick={() => setKeyword('')} className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
                                            {Icons.Close}
                                        </button>
                                    )}
                                </div>
                            </div>

                            <hr className="border-gray-100"/>

                            {/* 카테고리 (단일선택) */}
                            <div>
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="text-gray-600">{Icons.Category}</span>
                                    <span className="font-bold text-gray-700">카테고리 선택</span>
                                    <span className="text-xs bg-red-50 text-red-500 px-2 py-1 rounded-full font-bold">1개만 선택 가능</span>
                                </div>
                                <div className="flex flex-wrap gap-3">
                                    {CATEGORIES.map(cat => (
                                        <div 
                                            key={cat.id}
                                            onClick={() => handleCategoryClick(cat.id)}
                                            className={`
                                                flex items-center gap-2 px-4 py-3 rounded-lg border-2 cursor-pointer transition-all select-none
                                                ${selectedCat === cat.id 
                                                    ? 'border-blue-500 bg-blue-50 text-blue-800 font-bold shadow-sm' 
                                                    : 'border-gray-100 bg-white text-gray-600 hover:border-gray-300'
                                                }
                                            `}
                                        >
                                            {selectedCat === cat.id ? Icons.RadioOn : Icons.RadioOff}
                                            {cat.label}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <hr className="border-gray-100"/>

                            {/* 옵션 설정 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <div className="flex items-center gap-2 mb-3 text-gray-700 font-bold">
                                        {Icons.Filter} 정렬 방식
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {SORT_OPTIONS.map(opt => (
                                            <button 
                                                key={opt.value}
                                                onClick={() => setSortMethod(opt.value)}
                                                className={`px-3 py-2 text-sm rounded-lg border transition-colors ${sortMethod === opt.value ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                            >
                                                {opt.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="flex items-center gap-2 mb-3 text-gray-700 font-bold">
                                        {Icons.Eye} 보기 갯수
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {PAGE_SIZE_OPTIONS.map(size => (
                                            <button 
                                                key={size}
                                                onClick={() => setItemsPerPage(size)}
                                                className={`px-3 py-2 text-sm rounded-lg border transition-colors ${itemsPerPage === size ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}
                                            >
                                                {size}개씩
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* 검색 버튼 */}
                            <button 
                                onClick={executeSearch}
                                className="w-full h-16 bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold rounded-xl shadow-lg transition-transform active:scale-[0.98] flex items-center justify-center gap-3"
                            >
                                {Icons.Search} 검색 결과 보기 (새 창)
                            </button>

                        </div>
                        
                        {/* 결과 안내 메시지 */}
                        {searchUrl && (
                            <div className="bg-blue-50 p-6 text-center border-t border-blue-100">
                                <p className="text-blue-800 font-bold mb-2">검색 결과가 새 창에서 열렸습니다!</p>
                                <button onClick={() => window.open(searchUrl, '_blank')} className="text-sm text-blue-600 underline hover:text-blue-800">
                                    창이 안 떴다면 여기를 클릭하세요
                                </button>
                                <div className="mt-4 p-2 bg-white/50 rounded text-xs text-gray-400 break-all font-mono">
                                    {searchUrl}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

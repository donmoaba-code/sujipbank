                    { id: '002004042', label: '2019 광주FINA 세계수영선수권' },
                    { id: '002004043', label: '제100회 전국체육대회' },
                    { id: '002004044', label: '2020년대', children: [
                        { id: '002004044001', label: '새만금 세계스카우트잼버리' },

                        { id: '002004044003', label: '순천만국제정원박람회' },
                        { id: '002004044004', label: '한국 명산의 사계' },
                        { id: '002004044005', label: '한국의 센서스 100년' },
                        { id: '002004044006', label: '광복 80년' },
                        { id: '002004044007', label: '2025 APEC정상회의' },
                    ]},
                ]},
            ],
        };

        const CATALOG_MAP = {
            '001': KR_BANKNOTE_CATALOG,
            '002': KR_COIN_CATALOG,
        };

        const SORT_OPTIONS = [
            { value: '', label: '추천순' }, { value: 'orderCnt', label: '인기순' },
            { value: 'price_asc', label: '낮은가격' }, { value: 'price_dsc', label: '높은가격' },
            { value: 'regDt', label: '등록일순' },
        ];
        const PAGE_SIZE_OPTIONS = ['30', '60', '90', '120'];

        const parseInputKeyword = (text) => {
            const trimmed = text.trim();
            if (!trimmed) return '';
            return trimmed.split(/\s+/).filter(Boolean).join('%');
        };

        const mergeCatalogKeyword = (catalogTerms, userKeyword) => {
            const parts = [...catalogTerms];
            if (userKeyword) parts.push(...userKeyword.split('%').filter(Boolean));
            return parts.join('%');
        };

        const findCatalogNode = (node, id) => {
            if (node.id === id) return node;
            if (!node.children) return null;
            for (const child of node.children) {
                const found = findCatalogNode(child, id);
                if (found) return found;
            }
            return null;
        };

        const getAncestorIds = (node, targetId, path = []) => {
            if (node.id === targetId) return path;
            if (!node.children) return null;
            for (const child of node.children) {
                const result = getAncestorIds(child, targetId, [...path, node.id]);
                if (result) return result;
            }
            return null;
        };

        const getCatalogBreadcrumb = (catalogRoot, catalogId) => {
            const ancestors = getAncestorIds(catalogRoot, catalogId) || [];
            return [...ancestors, catalogId]
                .map(id => findCatalogNode(catalogRoot, id))
                .filter(Boolean)
                .map(n => n.label);
        };

        // goods_list.php는 keyword 파라미터를 무시함 → 검색어 있으면 퀵검색 사용
        // 그레이딩·미사용 등은 상품명에 없어 검색어로 쓰면 0건 → 제외
        const CATALOG_SKIP_TERMS = new Set([
            '그레이딩', '미사용', '사용제',
            '한국지폐 전체', '한국주화 전체', '현행주화', '현행권',
            '고전', '근대주화', '기념주화/메달', '민트세트',
        ]);

        const getCatalogSearchTerms = (catalogRoot, catalogId) => {
            const node = findCatalogNode(catalogRoot, catalogId);
            if (!node || catalogId === catalogRoot.id) return [];

            const paren = node.label.match(/\(([^)]+)\)/);
            if (paren && !CATALOG_SKIP_TERMS.has(paren[1])) return [paren[1]];

            const crumbs = getCatalogBreadcrumb(catalogRoot, catalogId).filter(l => l !== catalogRoot.label);
            for (let i = crumbs.length - 1; i >= 0; i--) {
                const label = crumbs[i];
                if (CATALOG_SKIP_TERMS.has(label)) continue;
                const mp = label.match(/\(([^)]+)\)/);
                if (mp && !CATALOG_SKIP_TERMS.has(mp[1])) return [mp[1]];
                if (/^\d+원$/.test(label) || /\d+원권/.test(label) || /\d+환/.test(label)) return [label];
            }
            const last = crumbs.filter(l => !CATALOG_SKIP_TERMS.has(l)).pop();
            return last ? [last] : [];
        };

        const buildQuickSearchParams = (categoryId, keyword) => {
            const slots = ['', '', '', ''];
            const cat = CATEGORIES.find(c => c.id === categoryId);
            if (cat) slots[cat.slot] = categoryId;
            const params = ['mode=quick'];
            slots.forEach(val => params.push(`quickCateGoods[]=${val}`));
            params.push('goodsPrice[]=', 'goodsPrice[]=');
            params.push(`keyword=${encodeURIComponent(keyword)}`);
            return params;
        };

        function CatalogTreeNode({ node, selectedId, onSelect, onOpenSearch, expandedIds, toggleExpand, depth }) {
            const hasChildren = node.children && node.children.length > 0;
            const isExpanded = expandedIds.has(node.id);
            const isSelected = selectedId === node.id;

            return (
                <div>
                    <div
                        className={`flex items-center gap-1 py-1.5 pr-2 rounded-lg cursor-pointer text-sm transition-colors ${isSelected ? 'bg-blue-100 text-blue-900 font-bold' : 'hover:bg-slate-50 text-slate-700'}`}
                        style={{ paddingLeft: `${depth * 14 + 8}px` }}
                        onClick={() => onSelect(node.id)}
                        onDoubleClick={(e) => {
                            e.preventDefault();
                            onSelect(node.id);
                            onOpenSearch(node.id);
                        }}
                        title="더블클릭: 수집뱅크 조회 (새 창)"
                    >
                        {hasChildren ? (
                            <button
                                type="button"
                                onClick={(e) => { e.stopPropagation(); toggleExpand(node.id); }}
                                className="w-5 h-5 shrink-0 text-xs text-slate-400 hover:text-blue-600"
                            >
                                {isExpanded ? '▼' : '▶'}
                            </button>
                        ) : <span className="w-5 shrink-0" />}
                        <span className="flex-1 leading-snug">{node.label}</span>
                        <span className="text-[10px] text-slate-400 font-mono shrink-0">{node.id}</span>
                    </div>
                    {hasChildren && isExpanded && node.children.map(child => (
                        <CatalogTreeNode
                            key={child.id}
                            node={child}
                            selectedId={selectedId}
                            onSelect={onSelect}
                            onOpenSearch={onOpenSearch}
                            expandedIds={expandedIds}
                            toggleExpand={toggleExpand}
                            depth={depth + 1}
                        />
                    ))}
                </div>
            );
        }

        function App() {
            const [inputValue, setInputValue] = useState('');
            const [selectedCat, setSelectedCat] = useState('');
            const [selectedCatalogId, setSelectedCatalogId] = useState('');
            const [expandedIds, setExpandedIds] = useState(new Set());
            const [sortMethod, setSortMethod] = useState('');
            const [itemsPerPage, setItemsPerPage] = useState('30');

            const activeCatalog = CATALOG_MAP[selectedCat] || null;
            const isCatalogMode = !!activeCatalog;

            const handleCategoryClick = (id) => {
                setSelectedCat(prev => {
                    if (prev === id) {
                        setSelectedCatalogId('');
                        setExpandedIds(new Set());
                        return '';
                    }
                    if (CATALOG_MAP[id]) {
                        setSelectedCatalogId(id);
                        setExpandedIds(new Set([id]));
                    } else {
                        setSelectedCatalogId('');
                        setExpandedIds(new Set());
                    }
                    return id;
                });
            };

            const toggleExpand = (id) => {
                setExpandedIds(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const handleCatalogSelect = (id) => {
                setSelectedCatalogId(id);
                if (!activeCatalog) return;
                const ancestors = getAncestorIds(activeCatalog, id) || [];
                setExpandedIds(prev => new Set([...prev, ...ancestors, id]));
            };

            const resetAll = () => {
                setInputValue(''); setSelectedCat('');
                setSelectedCatalogId(''); setExpandedIds(new Set());
                setSortMethod(''); setItemsPerPage('30');
            };

            const buildSearchUrl = (userKeyword, catalogIdOverride = null) => {
                const catalogId = catalogIdOverride ?? selectedCatalogId;

                if (isCatalogMode && catalogId && activeCatalog) {
                    if (userKeyword) {
                        const catalogTerms = getCatalogSearchTerms(activeCatalog, catalogId);
                        const searchKeyword = mergeCatalogKeyword(catalogTerms, userKeyword);
                        const baseUrl = 'https://www.sujipbank.com/goods/goods_search.php';
                        const params = buildQuickSearchParams(selectedCat, searchKeyword);
                        if (sortMethod) params.push(`sort=${sortMethod}`);
                        params.push(`pageNum=${itemsPerPage}`);
                        return `${baseUrl}?${params.join('&')}`;
                    }
                    const baseUrl = 'https://www.sujipbank.com/goods/goods_list.php';
                    const params = [`cateCd=${catalogId}`];
                    if (sortMethod) params.push(`sort=${sortMethod}`);
                    params.push(`pageNum=${itemsPerPage}`);
                    return `${baseUrl}?${params.join('&')}`;
                }

                const baseUrl = 'https://www.sujipbank.com/goods/goods_search.php';
                if (selectedCat) {
                    const slots = ['', '', '', ''];
                    const cat = CATEGORIES.find(c => c.id === selectedCat);
                    if (cat) slots[cat.slot] = selectedCat;
                    const params = ['mode=quick'];
                    slots.forEach(val => params.push(`quickCateGoods[]=${val}`));
                    params.push('goodsPrice[]=', 'goodsPrice[]=');
                    params.push(`keyword=${encodeURIComponent(userKeyword)}`);
                    if (sortMethod) params.push(`sort=${sortMethod}`);
                    params.push(`pageNum=${itemsPerPage}`);
                    return `${baseUrl}?${params.join('&')}`;
                }

                const params = [`keyword=${encodeURIComponent(userKeyword)}`];
                if (sortMethod) params.push(`sort=${sortMethod}`);
                params.push(`pageNum=${itemsPerPage}`);
                return `${baseUrl}?${params.join('&')}`;
            };

            const openSearch = (catalogIdOverride = null) => {
                window.open(buildSearchUrl(parseInputKeyword(inputValue), catalogIdOverride), '_blank');
            };

            const executeSearch = () => openSearch();

            useEffect(() => {
                const onKeyDown = (e) => {
                    if (e.key !== 'Enter') return;
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (isCatalogMode && selectedCatalogId) {
                        e.preventDefault();
                        openSearch(selectedCatalogId);
                    }
                };
                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, [isCatalogMode, selectedCatalogId]);

            return (
                <div className="min-h-screen flex items-start justify-center px-4 pt-4 pb-8">
                    <div className="w-full max-w-5xl bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-200">
                        <div className="bg-white px-5 py-4 border-b border-gray-100 flex items-center justify-between gap-3">
                            <h1 className="text-xl font-extrabold text-blue-900 flex items-center gap-2 shrink-0">
                                <span className="text-blue-600">{Icons.Search}</span>
                                수집뱅크 통합 검색
                                <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">v{APP_VERSION}</span>
                            </h1>
                            <button onClick={executeSearch} className="flex-1 max-w-xs h-9 bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold rounded-lg shadow transition-colors flex items-center justify-center gap-2">
                                {Icons.Search} {isCatalogMode ? '카탈로그 조회 (새 창)' : '검색 결과 보기 (새 창)'}
                            </button>
                            <button onClick={resetAll} className="flex items-center gap-1.5 px-3 py-1.5 bg-gray-100 hover:bg-gray-200 rounded-lg text-xs font-bold text-gray-600 transition-colors shrink-0">
                                {Icons.Reset} 초기화
                            </button>
                        </div>

                        <div className="p-5 space-y-5">
                            <div>
                                <div className="flex items-center justify-between mb-1.5 gap-2">
                                    <div className="flex items-center gap-4 min-w-0 flex-wrap">
                                        <label className="text-xs font-bold text-gray-700 shrink-0">검색어 입력</label>
                                        {inputValue.trim() && selectedCat && (
                                            <span className="text-[11px] text-orange-600 font-bold">
                                                ⚠️ 카테고리가 선택된 경우, 해당 카테고리 내에서만 검색이 진행됩니다.
                                            </span>
                                        )}
                                    </div>
                                    <span className="text-[10px] bg-orange-500 text-white px-2 py-0.5 rounded-full font-bold shrink-0">띄어쓰기=AND</span>
                                </div>
                                <div className="relative">
                                    <input
                                        type="text"
                                        value={inputValue}
                                        onChange={(e) => setInputValue(e.target.value)}
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                executeSearch();
                                            }
                                        }}
                                        placeholder="예: 정10원 유번호 · Enter로 검색 · 또는 '검색 (새 창)' 버튼 클릭으로 검색"
                                        className="w-full h-9 pl-3 pr-8 border border-gray-200 rounded-lg text-sm focus:border-blue-500 focus:outline-none transition-colors"
                                    />
                                    {inputValue && (
                                        <button onClick={() => setInputValue('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500">
                                            {Icons.Close}
                                        </button>
                                    )}
                                </div>
                            </div>

                            <hr className="border-gray-100"/>

                            <div>
                                <p className="text-[11px] text-gray-500 mb-2">
                                    카테고리는 1개만 선택가능 /{' '}
                                    <span className="text-orange-600 font-bold">원하는 카테고리 클릭=선택 / 다시 클릭=해제됨</span>
                                </p>
                                <div className="flex items-center gap-2 flex-wrap">
                                <span className="text-gray-600 shrink-0">{Icons.Category}</span>
                                <span className="text-xs font-bold text-gray-700 shrink-0">카테고리 선택</span>
                                {CATEGORIES.map(cat => (
                                    <div
                                        key={cat.id}
                                        onClick={() => handleCategoryClick(cat.id)}
                                        className={`flex items-center gap-1 px-2 py-1 rounded-md border cursor-pointer transition-all select-none text-xs ${selectedCat === cat.id ? 'border-blue-500 bg-blue-50 text-blue-800 font-bold' : 'border-gray-200 bg-white text-gray-600 hover:border-gray-300'}`}
                                    >
                                        {selectedCat === cat.id ? Icons.RadioOn : Icons.RadioOff}
                                        {cat.label}
                                        {cat.hasCatalog && <span className="text-[9px] bg-emerald-100 text-emerald-700 px-1 rounded">카탈로그</span>}
                                    </div>
                                ))}
                                </div>
                            </div>

                            {isCatalogMode && activeCatalog && (
                                <div className="p-4 bg-emerald-50/50 rounded-xl border border-emerald-100">
                                    <div className="flex items-center justify-between mb-3">
                                        <span className="font-bold text-emerald-900 text-sm">{CATEGORIES.find(c => c.id === selectedCat)?.label} 카탈로그</span>
                                        <span className="text-xs text-emerald-600">▶ 클릭: 펼치기 · 더블클릭 또는 Enter: 조회 (새 창)</span>
                                    </div>
                                    {selectedCatalogId && (
                                        <div className="mb-3 px-3 py-2 bg-white rounded-lg border border-emerald-200 text-sm">
                                            <span className="text-emerald-700 font-bold">선택: </span>
                                            {getCatalogBreadcrumb(activeCatalog, selectedCatalogId).join(' › ')}
                                            <span className="ml-2 text-xs font-mono text-slate-400">cateCd={selectedCatalogId}</span>
                                        </div>
                                    )}
                                    <div className="max-h-[32rem] overflow-y-auto bg-white rounded-lg border border-emerald-100 p-2" tabIndex={0}>
                                        <CatalogTreeNode
                                            node={activeCatalog}
                                            selectedId={selectedCatalogId}
                                            onSelect={handleCatalogSelect}
                                            onOpenSearch={openSearch}
                                            expandedIds={expandedIds}
                                            toggleExpand={toggleExpand}
                                            depth={0}
                                        />
                                    </div>
                                </div>
                            )}

                            <hr className="border-gray-100"/>

                            <div className="flex items-center gap-2 flex-wrap">
                                <span className="text-xs text-gray-700 font-bold shrink-0 flex items-center gap-1">{Icons.Filter} 정렬</span>
                                {SORT_OPTIONS.map(opt => (
                                    <button key={opt.value} onClick={() => setSortMethod(opt.value)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${sortMethod === opt.value ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}>
                                        {opt.label}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-2 flex-wrap">
                                <span className="text-xs text-gray-700 font-bold shrink-0 flex items-center gap-1">{Icons.Eye} 보기</span>
                                {PAGE_SIZE_OPTIONS.map(size => (
                                    <button key={size} onClick={() => setItemsPerPage(size)} className={`px-2 py-1 text-xs rounded-md border transition-colors ${itemsPerPage === size ? 'bg-slate-800 text-white border-slate-800' : 'bg-white border-gray-200 text-gray-500 hover:border-gray-400'}`}>
                                        {size}개씩
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
